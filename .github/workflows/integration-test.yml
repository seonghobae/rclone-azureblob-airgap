name: Integration test (Docker / Azure Private Link mock)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  RCLONE_VER: "1.73.2"

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Docker 컨테이너 안에서 rclone + FUSE + Azure Blob Storage 통합 테스트
  #
  # 실제 Azure 환경 없이 Azurite (Azure Storage Emulator) 를 Private Link 대역으로
  # 모의합니다:
  #   - Azurite: 내부 네트워크 전용으로 바인딩
  #   - /etc/hosts: <account>.blob.core.windows.net → 127.0.0.1 (Private DNS 모의)
  #   - rclone: disable_instance_discovery=true, endpoint=http://127.0.0.1:10000/devstoreaccount1
  #
  # 테스트 범위:
  #   1. deb 패키지 설치 검증
  #   2. FUSE3 오프라인 deb 설치
  #   3. rclone azureblob remote 설정 (Connection String → Azurite)
  #   4. 컨테이너 목록 / 오브젝트 업로드 / 다운로드
  #   5. rclone mount (FUSE, --vfs-cache-mode writes)
  #   6. 마운트 포인트에서 파일 읽기/쓰기
  #   7. systemd 없이 수동 마운트 cleanup 검증
  # ─────────────────────────────────────────────────────────────────────────────
  docker-integration:
    name: Docker integration test (${{ matrix.ubuntu }})
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        ubuntu: [jammy, noble]
        include:
          - ubuntu: jammy
            image: ubuntu:22.04
          - ubuntu: noble
            image: ubuntu:24.04

    steps:
      - uses: actions/checkout@v6.0.2

      # ── rclone 바이너리 다운로드 ──────────────────────────────────────────
      - name: Download rclone binary (amd64)
        run: |
          ZIP="rclone-v${RCLONE_VER}-linux-amd64.zip"
          curl -fsSL -o "${ZIP}" \
            "https://downloads.rclone.org/v${RCLONE_VER}/${ZIP}"
          unzip -j "${ZIP}" "*/rclone" -d rclone-bins/
          mv rclone-bins/rclone rclone-bins/rclone-linux-amd64
          chmod 755 rclone-bins/rclone-linux-amd64

      # ── Docker buildx (for --privileged + /dev/fuse) ──────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── 통합 테스트 실행 ──────────────────────────────────────────────────
      - name: Run integration test in Docker
        run: |
          # bash -c "$(cat script)" 방식은 특수문자 확장 문제 발생
          # 스크립트 파일을 직접 마운트해서 실행
          docker run \
            --rm \
            --privileged \
            --device /dev/fuse \
            --cap-add SYS_ADMIN \
            --security-opt apparmor:unconfined \
            -v "$(pwd):/workspace" \
            -e UBUNTU_CODENAME="${{ matrix.ubuntu }}" \
            ${{ matrix.image }} \
            bash /workspace/.github/scripts/run-integration-test.sh

  # ─────────────────────────────────────────────────────────────────────────────
  # Azure Private Link 환경 모의 — 네트워크 격리 테스트
  # Docker network none → hosts 파일 조작으로 Private DNS 동작 검증
  # ─────────────────────────────────────────────────────────────────────────────
  private-link-mock:
    name: Private Link DNS mock test
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Download rclone binary
        run: |
          ZIP="rclone-v${RCLONE_VER}-linux-amd64.zip"
          curl -fsSL -o "${ZIP}" \
            "https://downloads.rclone.org/v${RCLONE_VER}/${ZIP}"
          unzip -j "${ZIP}" "*/rclone" -d rclone-bins/
          mv rclone-bins/rclone rclone-bins/rclone-linux-amd64
          chmod 755 rclone-bins/rclone-linux-amd64

      - name: Build private-link test image
        run: |
          docker build \
            -f .github/docker/Dockerfile.private-link \
            -t rclone-private-link-test \
            .

      - name: Run private-link mock test
        run: |
          docker run \
            --rm \
            --privileged \
            --device /dev/fuse \
            --cap-add SYS_ADMIN \
            --security-opt apparmor:unconfined \
            rclone-private-link-test

  # ─────────────────────────────────────────────────────────────────────────────
  # configure-azureblob.sh 비인터랙티브 모드 테스트
  # ─────────────────────────────────────────────────────────────────────────────
  configure-script-test:
    name: configure-azureblob.sh non-interactive test
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Download rclone binary
        run: |
          ZIP="rclone-v${RCLONE_VER}-linux-amd64.zip"
          curl -fsSL -o "${ZIP}" \
            "https://downloads.rclone.org/v${RCLONE_VER}/${ZIP}"
          unzip -j "${ZIP}" "*/rclone" -d rclone-bins/
          mv rclone-bins/rclone rclone-bins/rclone-linux-amd64
          chmod 755 rclone-bins/rclone-linux-amd64
          sudo install -m 755 rclone-bins/rclone-linux-amd64 /usr/local/bin/rclone

      - name: Test Account Key config generation (non-interactive)
        run: |
          CONF=$(mktemp /tmp/rclone-test-XXXXXX.conf)
          # 입력 순서: remote이름 / account이름 / PrivateEndpoint?(n) / 인증방식(1) / Key / 업로드병렬도 / 청크 / 티어
          printf 'testremote\nmystorageaccount\nn\n1\nfakeBase64Key==\n16\n4M\nhot\n' \
            | bash scripts/configure-azureblob.sh --conf "$CONF" 2>&1 || true

          if grep -q "\[testremote\]" "$CONF" && grep -q "type.*=.*azureblob" "$CONF"; then
            echo "PASS: configure-azureblob.sh Account Key 설정 성공"
            grep -v "key\s*=" "$CONF"
          else
            echo "FAIL: conf 파일 내용:"
            cat "$CONF"
            exit 1
          fi
          rm -f "$CONF"

      - name: Test connection string config generation (non-interactive)
        run: |
          CONF=$(mktemp /tmp/rclone-test-XXXXXX.conf)
          CONN="DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://127.0.0.1:10000/devstoreaccount1;"
          # 입력 순서: remote이름 / account이름 / PrivateEndpoint?(n) / 인증방식(3=ConnStr) / ConnStr / 업로드병렬도 / 청크 / 티어
          printf 'conntest\ndevstoreaccount1\nn\n3\n%s\n16\n4M\nhot\n' "$CONN" \
            | bash scripts/configure-azureblob.sh --conf "$CONF" 2>&1 || true

          if grep -q "connection_string" "$CONF"; then
            echo "PASS: Connection String 설정 성공"
          else
            echo "FAIL"; cat "$CONF"; exit 1
          fi
          rm -f "$CONF"

      - name: Test disable_instance_discovery is always set
        run: |
          # 모든 인증 방식에 disable_instance_discovery=true 가 포함되어야 함
          CONF=$(mktemp /tmp/rclone-test-XXXXXX.conf)
          printf 'privtest\nmystorageaccount\nn\n1\nfakeKey==\n16\n4M\n\n' \
            | bash scripts/configure-azureblob.sh --conf "$CONF" 2>&1 || true
          if grep -q "disable_instance_discovery\s*=\s*true" "$CONF"; then
            echo "PASS: disable_instance_discovery=true 포함 확인 (Private Link 필수)"
          else
            echo "FAIL: disable_instance_discovery 미설정"; cat "$CONF"; exit 1
          fi
          rm -f "$CONF"

      - name: Test Private Endpoint config generation (non-interactive)
        run: |
          CONF=$(mktemp /tmp/rclone-test-XXXXXX.conf)
          printf 'petest\nmystorageaccount\ny\nhttps://mystorageaccount.blob.core.windows.net\n1\nfakeKey==\n16\n4M\n\n' \
            | bash scripts/configure-azureblob.sh --conf "$CONF" 2>&1 || true
          if grep -q "endpoint\s*=" "$CONF"; then
            echo "PASS: Private Endpoint 설정 포함"
          else
            echo "INFO: endpoint 줄 없음 (비필수, 건너뜀)"
          fi
          rm -f "$CONF"

      - name: Test SAS URL config generation (method 2)
        run: |
          CONF=$(mktemp /tmp/rclone-test-XXXXXX.conf)
          SAS="https://myaccount.blob.core.windows.net/?sv=2022-11-02&ss=b&sig=fakeSignature"
          # SAS: remote이름 / account이름 / PrivateEndpoint?(n) / 인증방식(2) / SAS URL / 병렬도 / 청크 / 티어
          printf 'sastest\nmyaccount\nn\n2\n%s\n16\n4M\n\n' "$SAS" \
            | bash scripts/configure-azureblob.sh --conf "$CONF" 2>&1 || true
          if grep -q "sas_url" "$CONF"; then
            echo "PASS: SAS URL 설정 성공"
            grep -v "sig=" "$CONF"  # signature 제외 출력
          else
            echo "FAIL: sas_url 없음"; cat "$CONF"; exit 1
          fi
          grep -q "disable_instance_discovery.*=.*true" "$CONF" && \
            echo "PASS: disable_instance_discovery=true (SAS도 포함)" || \
            { echo "FAIL: disable_instance_discovery 없음"; exit 1; }
          rm -f "$CONF"

      - name: Test Service Principal (Secret) config generation (method 4)
        run: |
          CONF=$(mktemp /tmp/rclone-test-XXXXXX.conf)
          # SP Secret: remote / account / PE?(n) / 인증(4) / TenantID / ClientID / ClientSecret / 병렬도 / 청크 / 티어
          printf 'sptest\nmyaccount\nn\n4\nabc-tenant-id\nabc-client-id\nfakeClientSecret\n16\n4M\n\n' \
            | bash scripts/configure-azureblob.sh --conf "$CONF" 2>&1 || true
          if grep -q "client_secret" "$CONF" && grep -q "tenant" "$CONF"; then
            echo "PASS: Service Principal (Secret) 설정 성공"
            grep -v "client_secret\s*=" "$CONF"
          else
            echo "FAIL: SP 설정 없음"; cat "$CONF"; exit 1
          fi
          rm -f "$CONF"

      - name: Test Service Principal (Certificate) config generation (method 5)
        run: |
          CONF=$(mktemp /tmp/rclone-test-XXXXXX.conf)
          # SP Cert: remote / account / PE?(n) / 인증(5) / TenantID / ClientID / 인증서경로 / 암호(없음=Enter) / 병렬도 / 청크 / 티어
          printf 'spcerttest\nmyaccount\nn\n5\nabc-tenant-id\nabc-client-id\n/etc/rclone/certs/sp.pem\n\n16\n4M\n\n' \
            | bash scripts/configure-azureblob.sh --conf "$CONF" 2>&1 || true
          if grep -q "client_certificate_path" "$CONF"; then
            echo "PASS: Service Principal (Certificate) 설정 성공"
            cat "$CONF"
          else
            echo "FAIL: client_certificate_path 없음"; cat "$CONF"; exit 1
          fi
          rm -f "$CONF"

      - name: Test Managed Identity (System) config generation (method 6a)
        run: |
          CONF=$(mktemp /tmp/rclone-test-XXXXXX.conf)
          # MSI System: remote / account / PE?(n) / 인증(6) / MSI타입(a=system) / 병렬도 / 청크 / 티어
          printf 'msitest\nmyaccount\nn\n6\na\n16\n4M\n\n' \
            | bash scripts/configure-azureblob.sh --conf "$CONF" 2>&1 || true
          if grep -q "use_msi.*=.*true" "$CONF"; then
            echo "PASS: MSI (System-assigned) 설정 성공"
            cat "$CONF"
          else
            echo "FAIL: use_msi 없음"; cat "$CONF"; exit 1
          fi
          rm -f "$CONF"

      - name: Test Managed Identity (User-assigned) config generation (method 6b)
        run: |
          CONF=$(mktemp /tmp/rclone-test-XXXXXX.conf)
          # MSI User: remote / account / PE?(n) / 인증(6) / MSI타입(b) / MSI Client ID / 병렬도 / 청크 / 티어
          printf 'msiusertest\nmyaccount\nn\n6\nb\nabc-msi-client-id\n16\n4M\n\n' \
            | bash scripts/configure-azureblob.sh --conf "$CONF" 2>&1 || true
          if grep -q "use_msi.*=.*true" "$CONF" && grep -q "msi_client_id" "$CONF"; then
            echo "PASS: MSI (User-assigned) 설정 성공"
            cat "$CONF"
          else
            echo "FAIL: msi_client_id 없음"; cat "$CONF"; exit 1
          fi
          rm -f "$CONF"

      - name: Test env_auth config generation (method 7)
        run: |
          CONF=$(mktemp /tmp/rclone-test-XXXXXX.conf)
          # env_auth: remote / account / PE?(n) / 인증(7) / 병렬도 / 청크 / 티어
          printf 'envtest\nmyaccount\nn\n7\n16\n4M\n\n' \
            | bash scripts/configure-azureblob.sh --conf "$CONF" 2>&1 || true
          if grep -q "env_auth.*=.*true" "$CONF"; then
            echo "PASS: env_auth 설정 성공"
            cat "$CONF"
          else
            echo "FAIL: env_auth 없음"; cat "$CONF"; exit 1
          fi
          rm -f "$CONF"
