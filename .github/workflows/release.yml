name: Release

on:
  push:
    tags:
      - 'v*'

env:
  RCLONE_VER: "1.73.2"
  PKG_NAME: "rclone-azureblob-airgap"

jobs:
  build-release-debs:
    name: Build release deb (${{ matrix.arch }})
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        arch: [amd64, arm64]
    outputs:
      version: ${{ steps.version.outputs.PKG_VERSION }}

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Derive version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          echo "PKG_VERSION=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Version: ${TAG}"

      - name: Download rclone binary
        run: |
          ZIP="rclone-v${RCLONE_VER}-linux-${{ matrix.arch }}.zip"
          curl -fsSL -o "${ZIP}" \
            "https://downloads.rclone.org/v${RCLONE_VER}/${ZIP}"
          EXPECTED=$(curl -fsSL \
            "https://downloads.rclone.org/v${RCLONE_VER}/SHA256SUMS" \
            | grep "${ZIP}" | awk '{print $1}')
          ACTUAL=$(sha256sum "${ZIP}" | awk '{print $1}')
          [ "${EXPECTED}" = "${ACTUAL}" ] || { echo "::error::체크섬 불일치"; exit 1; }
          unzip -j "${ZIP}" "*/rclone" -d rclone-bins/
          mv rclone-bins/rclone rclone-bins/rclone-linux-${{ matrix.arch }}
          chmod 755 rclone-bins/rclone-linux-${{ matrix.arch }}

      - name: Install build tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            debhelper devscripts dpkg-dev fakeroot

      - name: Update changelog
        run: |
          VER="${{ steps.version.outputs.PKG_VERSION }}"
          DATE=$(date -R)
          {
            echo "${PKG_NAME} (${VER}) stable; urgency=medium"
            echo ""
            echo "  * Release ${VER}"
            echo "  * rclone ${RCLONE_VER} binary"
            echo "  * Azure Blob Storage Private Link support"
            echo ""
            echo " -- github-actions <actions@github.com>  ${DATE}"
            echo ""
            cat debian/changelog
          } > debian/changelog.new
          mv debian/changelog.new debian/changelog

      - name: Build deb
        run: |
          fakeroot dpkg-buildpackage -b -us -uc --host-arch=${{ matrix.arch }}

      - name: Collect deb
        run: |
          VER="${{ steps.version.outputs.PKG_VERSION }}"
          DEB=$(find "$GITHUB_WORKSPACE/.." -maxdepth 1 -name "${PKG_NAME}_*.deb" 2>/dev/null | head -1)
          [ -z "$DEB" ] && DEB=$(find "$GITHUB_WORKSPACE" -maxdepth 2 -name "${PKG_NAME}_*.deb" 2>/dev/null | head -1)
          FINAL="${PKG_NAME}_${VER}_${{ matrix.arch }}.deb"
          cp "$DEB" "$FINAL"
          sha256sum "$FINAL" > "${FINAL}.sha256"
          echo "DEB=${FINAL}" >> "$GITHUB_ENV"

      - name: Upload release artifact
        uses: actions/upload-artifact@v7.0.0
        with:
          name: release-deb-${{ matrix.arch }}
          path: |
            ${{ env.PKG_NAME }}_*.deb
            ${{ env.PKG_NAME }}_*.deb.sha256

  smoke-release:
    name: Smoke release (${{ matrix.arch }} on ${{ matrix.runner }})
    runs-on: ${{ matrix.runner }}
    needs: build-release-debs
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-22.04
            artifact: release-deb-amd64
            codename: jammy
          - arch: arm64
            runner: ubuntu-24.04-arm
            artifact: release-deb-arm64
            codename: noble

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Download release deb artifact
        uses: actions/download-artifact@v8.0.1
        with:
          name: ${{ matrix.artifact }}
          path: dist/

      - name: Install deb from tagged build
        run: |
          sudo dpkg -i --force-depends dist/*.deb

      - name: Verify release package install
        run: |
          dpkg --print-architecture | grep -x "${{ matrix.arch }}"
          . /etc/os-release && test "$VERSION_CODENAME" = "${{ matrix.codename }}"
          rclone version
          dpkg -l libfuse3-3 | grep "^ii"
          dpkg -l fuse3 | grep "^ii"
          test -f /etc/fuse.conf && grep -q "user_allow_other" /etc/fuse.conf

      - name: Verify bundled assets
        run: |
          test -f /usr/share/rclone-azureblob-airgap/examples/rclone-mount-example.conf
          COUNT=$(find /usr/share/rclone-azureblob-airgap/fuse-debs/ -name "*.deb" | wc -l)
          [ "$COUNT" -eq 8 ]

      - name: Run verify-mount.sh
        run: |
          sudo bash /usr/share/rclone-azureblob-airgap/scripts/verify-mount.sh --allow-missing-fuse

      - name: Run verify-azureblob.sh (no remote)
        run: |
          bash /usr/share/rclone-azureblob-airgap/scripts/verify-azureblob.sh --allow-missing-fuse

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-22.04
    needs: [build-release-debs, smoke-release]
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Download all deb artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          pattern: release-deb-*
          merge-multiple: true
          path: dist/

      - name: List dist/
        run: ls -lh dist/

      - name: Generate release notes
        id: notes
        run: |
          VER="${GITHUB_REF#refs/tags/v}"
          cat > release-notes.md << EOF
          ## rclone-azureblob-airgap ${VER}

          Azure Blob Storage 폐쇄망(Air-gapped) Ubuntu VM용 rclone 부트스트랩 패키지

          ### 포함 내용
          - **rclone ${RCLONE_VER}** (amd64 / arm64)
          - **FUSE3 오프라인 deb**: Ubuntu 22.04(jammy) / 24.04(noble) × amd64/arm64
          - **Azure Blob 인증 템플릿**: Account Key, SAS URL, Connection String, Service Principal, MSI
          - **systemd 유닛**: \`rclone-azureblob@.service\`
          - **Azure Private Link** 대응: \`disable_instance_discovery = true\` 기본값

          ### 설치

          \`\`\`bash
          # 1. deb 다운로드 (인터넷 되는 머신)
          curl -LO https://github.com/seonghobae/rclone-azureblob-airgap/releases/download/v${VER}/rclone-azureblob-airgap_${VER}_amd64.deb

          # 2. VM으로 전송 후 설치
          sudo dpkg -i --force-depends rclone-azureblob-airgap_${VER}_amd64.deb

          # 3. Azure Blob 설정
          bash /usr/share/rclone-azureblob-airgap/scripts/configure-azureblob.sh

          # 4. 검증
          bash /usr/share/rclone-azureblob-airgap/scripts/verify-azureblob.sh --remote <이름>
          \`\`\`

          ### Private Link 설정 요점
          모든 설정에 \`disable_instance_discovery = true\` 가 포함되어
          \`login.microsoft.com\` 메타데이터 조회 없이 동작합니다.
          EOF

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VER="${GITHUB_REF#refs/tags/v}"
          gh release create "v${VER}" \
            --title "rclone-azureblob-airgap v${VER}" \
            --notes-file release-notes.md \
            dist/*.deb \
            dist/*.sha256
