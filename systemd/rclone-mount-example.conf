# /etc/rclone/mounts/INSTANCE_NAME.conf
# 
# 이 파일을 /etc/rclone/mounts/<서비스이름>.conf 로 복사하고 편집하세요.
# 예: /etc/rclone/mounts/s3data.conf
#     → systemctl start rclone-mount@s3data.service
#
# ──────────────────────────────────────────────────────────
# 필수 설정
# ──────────────────────────────────────────────────────────

# rclone remote 이름과 경로 (rclone.conf 의 [섹션명]:경로)
REMOTE=myremote:mybucket/path

# 로컬 마운트 포인트 (미리 mkdir -p 로 생성 권장)
MOUNTPOINT=/mnt/rclone/mydata

# ──────────────────────────────────────────────────────────
# 선택 추가 옵션 (공백으로 구분)
# ──────────────────────────────────────────────────────────

# 다른 사용자도 접근 허용 (/etc/fuse.conf 에 user_allow_other 필요)
# EXTRA_ARGS=--allow-other

# 읽기 전용 마운트
# EXTRA_ARGS=--read-only

# VFS 캐시 없음 (최소 메모리, 임의 쓰기 불가)
# EXTRA_ARGS=--vfs-cache-mode off

# 전체 캐시 (파일을 로컬에 완전 캐싱, 많은 디스크 필요)
# EXTRA_ARGS=--vfs-cache-mode full --vfs-cache-max-size 10G

# uid/gid 강제 (컨테이너 환경)
# EXTRA_ARGS=--uid 1000 --gid 1000 --umask 022
