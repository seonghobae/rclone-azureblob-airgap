# mount 인스턴스 설정: Account Key 인증
# 파일 위치: /etc/rclone/mounts/azblob-key.conf
# 서비스: systemctl start rclone-mount@azblob-key.service

# rclone remote 이름 (rclone.conf [섹션] 이름)
REMOTE=azblob-key:mycontainer

# 로컬 마운트 포인트
MOUNTPOINT=/mnt/azureblob

# 추가 rclone mount 옵션
EXTRA_ARGS=--allow-other --vfs-cache-mode writes --vfs-cache-max-size 2G --buffer-size 256M
