# =============================================================================
# rclone Azure Blob Storage 설정 템플릿
# 경로: /etc/rclone/rclone.conf 에 이 내용을 추가하거나 병합하세요.
#
# 인증 방식 선택 가이드:
#   ① Account Key          → 가장 간단, Storage Account 의 Access Key 사용
#   ② SAS URL              → 임시/제한 접근, 컨테이너/계정 단위 URL
#   ③ Connection String    → Azure Portal "연결 문자열" 직접 붙여넣기
#   ④ Service Principal    → 앱 등록(App Registration) + Client Secret/인증서
#   ⑤ Managed Identity     → Azure VM에 할당된 관리 ID (MSI)
#   ⑥ env_auth             → 환경 변수·CLI·MSI 자동 탐색
#
# 폐쇄망 핵심 주의:
#   - disable_instance_discovery = true  →  login.microsoft.com 접근 불가 환경 필수
#   - endpoint 설정              →  Private Endpoint 사용 시 명시
#   - 인증 ③·④·⑤는 OAuth token을 위해 login.microsoftonline.com 접근 필요
#     → Private Link + DNS Override 로 우회하거나 ①·② 방식을 사용하세요.
# =============================================================================

# ─────────────────────────────────────────────────────────────────────────────
# 방식 ①: Account Key (Storage Account + Shared Key) — 폐쇄망에서 가장 안정적
# ─────────────────────────────────────────────────────────────────────────────
# [azblob-key]
# type                     = azureblob
# account                  = <스토리지계정이름>
# key                      = <Base64인코딩된AccessKey>
# # Private Endpoint 사용 시 아래 endpoint 주석 해제 후 실제 FQDN 입력
# # endpoint               = https://<account>.blob.core.windows.net
# # 폐쇄망: AAD 인스턴스 메타데이터 조회 건너뜀 (login.microsoft.com 불필요)
# disable_instance_discovery = true
# # 대용량 업로드 병렬도 (기본 16 → 1Gbps 링크면 64 권장)
# upload_concurrency       = 16
# chunk_size               = 4M
# # 디렉터리 빈 폴더를 오브젝트로 유지하려면 true (탐색기 호환)
# directory_markers        = false

# ─────────────────────────────────────────────────────────────────────────────
# 방식 ②-a: SAS URL — 계정 수준 SAS
# ─────────────────────────────────────────────────────────────────────────────
# [azblob-sas-account]
# type                     = azureblob
# sas_url                  = https://<account>.blob.core.windows.net/?sv=...&sig=...
# disable_instance_discovery = true

# ─────────────────────────────────────────────────────────────────────────────
# 방식 ②-b: SAS URL — 컨테이너 수준 SAS (지정 컨테이너만 접근)
# ─────────────────────────────────────────────────────────────────────────────
# [azblob-sas-container]
# type                     = azureblob
# sas_url                  = https://<account>.blob.core.windows.net/<container>?sv=...&sig=...
# disable_instance_discovery = true

# ─────────────────────────────────────────────────────────────────────────────
# 방식 ③: Connection String (Azure Portal → 스토리지 계정 → 액세스 키 → 연결 문자열)
# ─────────────────────────────────────────────────────────────────────────────
# [azblob-connstr]
# type                     = azureblob
# connection_string        = DefaultEndpointsProtocol=https;AccountName=<name>;AccountKey=<key>;EndpointSuffix=core.windows.net
# disable_instance_discovery = true

# ─────────────────────────────────────────────────────────────────────────────
# 방식 ④-a: Service Principal — Client Secret
# Azure AD 앱 등록 후 "스토리지 Blob 데이터 기여자" 역할 할당 필요
# 폐쇄망: login.microsoftonline.com 접근 가능해야 함 (Private Link 필요 시 endpoint 설정)
# ─────────────────────────────────────────────────────────────────────────────
# [azblob-sp-secret]
# type                     = azureblob
# account                  = <스토리지계정이름>
# tenant                   = <TenantID-GUID>
# client_id                = <AppClientID-GUID>
# client_secret            = <ClientSecret값>
# disable_instance_discovery = true

# ─────────────────────────────────────────────────────────────────────────────
# 방식 ④-b: Service Principal — 인증서 (PEM/PKCS12)
# ─────────────────────────────────────────────────────────────────────────────
# [azblob-sp-cert]
# type                          = azureblob
# account                       = <스토리지계정이름>
# tenant                        = <TenantID-GUID>
# client_id                     = <AppClientID-GUID>
# client_certificate_path       = /etc/rclone/certs/sp-cert.pem
# # 인증서에 암호가 있으면 obscure 처리된 값 입력:
# # rclone obscure <실제암호> 실행 후 출력값을 아래에 입력
# # client_certificate_password = <obscured값>
# client_send_certificate_chain = false
# disable_instance_discovery    = true

# ─────────────────────────────────────────────────────────────────────────────
# 방식 ⑤: Managed Identity (MSI) — Azure VM에서만 동작
# VM에 시스템 할당 관리 ID 또는 사용자 할당 관리 ID 필요
# ─────────────────────────────────────────────────────────────────────────────
# [azblob-msi-system]
# type                     = azureblob
# account                  = <스토리지계정이름>
# use_msi                  = true
# # 시스템 할당 ID: msi_* 파라미터 모두 주석 처리
# # 사용자 할당 ID: 아래 중 하나만 지정
# # msi_client_id          = <UserAssignedMSI-ClientID>
# # msi_object_id          = <UserAssignedMSI-ObjectID>
# # msi_mi_res_id          = /subscriptions/.../resourceGroups/.../providers/Microsoft.ManagedIdentity/userAssignedIdentities/<name>
# disable_instance_discovery = true

# ─────────────────────────────────────────────────────────────────────────────
# 방식 ⑥: env_auth — 환경 변수 / Azure CLI / MSI 자동 탐색
# 환경 변수: AZURE_TENANT_ID, AZURE_CLIENT_ID, AZURE_CLIENT_SECRET 등
# ─────────────────────────────────────────────────────────────────────────────
# [azblob-env]
# type                     = azureblob
# account                  = <스토리지계정이름>
# env_auth                 = true
# disable_instance_discovery = true

# ─────────────────────────────────────────────────────────────────────────────
# Private Endpoint 전용 예시 (방식 ①  + Private Link)
# DNS 오버라이드로 <account>.blob.core.windows.net → 내부 IP 매핑 필요
# ─────────────────────────────────────────────────────────────────────────────
# [azblob-private]
# type                     = azureblob
# account                  = <스토리지계정이름>
# key                      = <AccessKey>
# endpoint                 = https://<account>.blob.core.windows.net
# disable_instance_discovery = true
# no_check_container       = false
# upload_concurrency       = 32
# chunk_size               = 16M
